name: Monitor Categories

on:
  schedule:
    # Run every 2 days at 2:00 AM UTC (staggered from other workflows)
    - cron: '0 2 */2 * *'
  
  workflow_dispatch:  # Allow manual trigger

jobs:
  discover:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          cd category_monitor
          pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium
      
      - name: Discover categories
        id: discover
        run: |
          cd category_monitor
          python discover.py
      
      - name: Check for changes in categories.json
        id: changes
        run: |
          cd category_monitor
          if git diff --exit-code categories.json > /dev/null 2>&1; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT

          fi
      
      - name: Commit changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          # Add all newly created scraper folders (all non-ignored files)
          git add HyperStack/ 2>/dev/null || true
          
          # Show what will be committed
          echo "📋 Files to commit:"
          git diff --cached --name-only
          
          # Commit if there are changes
          if git diff --cached --quiet; then
            echo "✓ No new files to commit"
          else
            echo "✅ Committing changes..."
            git commit -m "🚀 Auto-generated scrapers + 📋 Updated category registry [bot] - $(date -u +'%Y-%m-%d')"
            git push
            echo "✅ Changes pushed to repository"
          fi
      
      - name: Create issue for new categories
        if: steps.changes.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Read the updated categories file
            const categoriesPath = 'category_monitor/categories.json';
            const newCategories = JSON.parse(fs.readFileSync(categoriesPath, 'utf8'));
            
            // Get git diff to show what changed
            const { execSync } = require('child_process');
            let oldCategories = { categories: {} };
            try {
              const diff = execSync('git show HEAD:category_monitor/categories.json').toString();
              oldCategories = JSON.parse(diff);
            } catch (e) {
              // Previous version unavailable (first run), use empty object
              oldCategories = { categories: {} };
            }
            const oldSlugs = Object.keys(oldCategories.categories || {});
            const newSlugs = Object.keys(newCategories.categories);
            
            const added = newSlugs.filter(s => !oldSlugs.includes(s));
            const removed = oldSlugs.filter(s => !newSlugs.includes(s));
            
            if (added.length > 0 || removed.length > 0) {
              let body = '## 🔍 Category Changes Detected\n\n';
              
              if (added.length > 0) {
                body += `### 🆕 New Categories (${added.length})\n`;
                body += added.map(slug => {
                  const cat = newCategories.categories[slug];
                  const scraper = cat.has_scraper ? '✅' : '❌';
                  return `- ${scraper} **${cat.name}** (\`${slug}\`)\n  - URL: ${cat.url}\n  - Project: ${cat.project}\n`;
                }).join('');
              }
              
              if (removed.length > 0) {
                body += `\n### 🗑️ Removed Categories (${removed.length})\n`;
                body += removed.map(slug => {
                  const cat = oldCategories.categories[slug];
                  const scraper = cat.has_scraper ? '⚠️' : '✓';
                  return `- ${scraper} **${cat.name}** (\`${slug}\`)\n  - URL: ${cat.url}\n  - Project: ${cat.project}\n`;
                }).join('');
              }
              
              body += '\n---\n\n';
              body += '**Action Required:**\n';
              if (added.length > 0) {
                body += `- Create scraper for ${added.length} new categor${added.length !== 1 ? 'ies' : 'y'}\n`;
              }
              if (removed.length > 0) {
                body += `- Archive or update scraper for ${removed.length} removed categor${removed.length !== 1 ? 'ies' : 'y'}\n`;
              }
              
              body += '\n**Registry Updated:** ' + new Date().toISOString() + '\n';
              body += '**Workflow:** [View Run](../actions/runs/${{ github.run_id }})';
              
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🔄 Category Changes: ${added.length} added, ${removed.length} removed`,
                body: body,
                labels: ['category-change', 'monitoring', 'auto-generated']
              });
              
              console.log(`✅ Created issue for ${added.length} new and ${removed.length} removed categories`);
            }
      
      - name: Success summary
        if: always()
        run: |
          echo "=================================================="
          echo "✅ CATEGORY MONITORING COMPLETED"
          echo "=================================================="
          echo ""
          echo "📊 Registry: HyperStack/category_monitor/categories.json"
          echo "🔗 Changes detected: ${{ steps.changes.outputs.changed }}"
          echo ""
          if [ "${{ steps.changes.outputs.changed }}" = "true" ]; then
            echo "📝 New scrapers created in HyperStack/"
            ls -la HyperStack/ | grep -E '^d' | grep -v '^\.' | awk '{print "   📁 " $NF}'
            echo ""
            echo "📋 GitHub Issue created for tracking"
          else
            echo "✓ No changes detected - all categories stable"
          fi
          echo ""
          echo "=================================================="
